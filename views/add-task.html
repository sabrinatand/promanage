<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
  <title>Add Book Page</title>
  <link href="/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 20px;
    }

    .bg-image {
      min-height: 100vh;
      background: url('/image/background8.jpg') no-repeat;
      background-size: cover;
      background-position: center;
    }

    input.transparent-input {
      opacity: 0.7;
    }
    .navbar ul {
      flex: 1;
      text-align: right;
    }

    .navbar ul li {
      list-style: none;
      display: inline-block;
      margin: 0 20px;
      position: relative;
    }

    .navbar ul li a {
      text-decoration: none;
      color: var(--secondary-color);
      text-transform: uppercase;
    }

    .navbar ul li::after {
      content: '';
      height: 3px;
      width: 0;
      background: #009688;
      position: absolute;
      left: 0;
      bottom: 0px;
      transition: 0.5s;
    }

    .navbar ul li:hover::after {
      width: 100%;
    }
    .submit {
      border-radius: 50px;
      width: 100px;
      padding: 10px;
    }

    .card {
      background: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0));
    }

    h3 {
      opacity: 0.7;
    }

    .input-style {
      border-radius: 50px;
      width: 500px;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="bg-image">
  <main>
    <div class="album py-5">
      <div class="container">
        <a type="button" class="btn btn-light text-dark" href="/home">Home</a>
        <a type="button" class="btn btn-light text-dark" href="/product-backlog">Product Backlog</a>

        <h3 class="my-2 text-white">Add New Task</h3>

        <div class="row row-cols-1 row-cols-sm-2 g-3">
          <div class="col">
            <div class="card shadow-sm">
              <div class="card-body">
                <form action="/add-task" method="POST">
                  <div class="mb-3">
                    <label for="name" class="form-label" style="color: white;">Task Name</label>
                    <input type="text" name="name" class="form-control input-style" id="name" placeholder="Enter task name" required />
                  </div>

                  <div class="mb-3">
                    <label for="description" class="form-label" style="color: white;">Description</label>
                    <input type="text" name="description" class="form-control input-style" id="description" placeholder="Enter description" />
                  </div>

                  <div class="mb-3">
                    <label for="teamMember" class="form-label" style="color: white;">Assigned Member</label>
                    <select name="teamMember" class="form-select input-style" id="teamMember">
                      <% for(let i=0; i < members.length; i++ ){ %>
                      <option value="<%= members[i].name %>"><%= members[i].name %></option>
                      <% } %>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label for="priority" class="form-label" style="color: white;">Priority</label>
                    <select name="priority" class="form-select input-style" id="priority">
                      <option value="Low">Low</option>
                      <option value="Medium">Medium</option>
                      <option value="High">High</option>
                      <option value="Urgent">Urgent</option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label for="startDate" class="form-label" style="color: white;">Start Date (default is current time)</label>
                    <input type="datetime-local" name="startDate" class="form-control input-style" id="startDate" value="2023-01-01T00:00" />
                  </div>

                  <div class="mb-3">
                    <label for="dueDate" class="form-label" style="color: white;">Due Date</label>
                    <input type="datetime-local" name="dueDate" class="form-control input-style" id="dueDate" value="2023-01-01T00:00" />
                  </div>

                  <button class="btn btn-outline-light submit">Submit</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>

</html>
