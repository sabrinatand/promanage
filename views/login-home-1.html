<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <title>Project Manager</title>
</head>

<body>
  <style>
    :root {
      --primary-color: rgba(231, 224, 224, 0.75);
      --secondary-color: #322e2e;
    }

    * { box-sizing: border-box; }

    body { margin: 0; font-family: 'DM Sans', sans-serif; }

    .banner {
      width: 100%;
      height: 100vh;
      background-image: linear-gradient(rgba(10,12,18,0.5), rgba(10,12,18,0.9)), url(/image/background2.jpg);
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      position: relative;
    }

    .navbar {
      width: 85%;
      margin: auto;
      padding: 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { width: 130px; cursor: pointer; }

    .content {
      width: 100%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      color: #f0ede8;
      padding: 0 16px;
    }

    .content h1 {
      font-family: "Poppins", sans-serif;
      font-size: clamp(32px, 5.5vw, 62px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-top: 80px;
      margin-bottom: 0;
      color: #f0ede8;
    }

    .content p {
      margin: 20px auto;
      font-weight: 400;
      line-height: 25px;
      color: rgba(240,237,232,0.5);
    }

    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    button {
      width: 220px;
      padding: 13px 0;
      text-align: center;
      margin: 8px 10px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .content > div:nth-child(2) button {
      background: #e8b86d;
      border: 2px solid #e8b86d;
      color: #0a0c12;
    }
    .content > div:nth-child(2) button:hover {
      background: #f0c87e;
      border-color: #f0c87e;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,184,109,0.35);
    }

    .content > div:nth-child(3) button {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #f0ede8;
    }
    .content > div:nth-child(3) button:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-2px);
    }

    .content > div:nth-child(4) button {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.1);
      color: rgba(240,237,232,0.5);
      font-size: 13px;
    }
    .content > div:nth-child(4) button:hover {
      border-color: rgba(255,255,255,0.22);
      color: rgba(240,237,232,0.8);
      transform: translateY(-1px);
    }

    span { display: none; }
    .button-link { text-decoration: none; }
  </style>

  <div class="banner">
    <div class="navbar">
      <img src="/image/logo2.png" class="logo">
    </div>
    <div class="content">
      <h1>PROJECT MANAGEMENT APP</h1>
      <div>
        <a href="/login" class="button-link">
          <button type="button"><span></span>Log In</button>
        </a>
      </div>
      <div>
        <a href="/signup" class="button-link">
          <button type="button"><span></span>Sign Up</button>
        </a>
      </div>
      <div>
        <a href="/admin" class="button-link">
          <button type="button"><span></span>Admin Access</button>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
