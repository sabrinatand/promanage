<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Account Created</title>
</head>

<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url(/image/background2.jpg) no-repeat center center/cover;
      background-attachment: fixed;
      position: relative;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 16, 0.72);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      background: rgba(18, 21, 32, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #f0ede8;
      border-radius: 16px;
      padding: 40px 32px 36px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .wrapper h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: #f0ede8;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(240, 237, 232, 0.65);
      margin-bottom: 28px;
    }

    .credential-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 16px;
      text-align: left;
    }

    .credential-box h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e8b86d;
      margin-bottom: 8px;
    }

    .credential-box p {
      font-size: 14px;
      color: #f0ede8;
      line-height: 1.7;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      height: 46px;
      border: none;
      outline: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.06);
      color: #f0ede8;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.11);
      transform: translateY(-1px);
    }

    .button-link {
      text-decoration: none;
      display: block;
      margin-top: 18px;
    }

    @media (max-width: 576px) {
      .wrapper {
        padding: 32px 20px 28px;
      }

      .wrapper h1 {
        font-size: 24px;
      }

      .credential-box h2 {
        font-size: 15px;
      }

      .credential-box p {
        font-size: 13px;
      }
    }
  </style>

  <div class="wrapper">
    <h1>Account Created</h1>
    <p class="subtitle">Your account has been successfully created.</p>

    <% records.forEach(user => { %>
      <div class="credential-box">
        <h2>Username</h2>
        <p><%= user.usernameUser %></p>
      </div>

      <div class="credential-box">
        <h2>Password</h2>
        <p><%= user.passwordUser %></p>
      </div>
    <% }) %>

    <a href="/" class="button-link">
      <button type="button" class="btn">Go Back</button>
    </a>
  </div>
</body>
</html>
