<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Admin — ProManage</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

    .page {
      width: 100%; min-height: 100vh;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* subtle grid */
    .page::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* glow accent */
    .page::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(129,140,248,.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
    }

    .content {
      position: relative; z-index: 1;
      text-align: center;
      padding: 0 24px;
    }

    .logo { width: 100px; margin-bottom: 40px; opacity: .9; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      background: rgba(129,140,248,.12); color: #818cf8;
      border: 1px solid rgba(129,140,248,.25);
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700; letter-spacing: -1px;
      color: #f1f5f9; line-height: 1.1;
      margin-bottom: 10px;
    }
    h2 {
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 400; color: #64748b;
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 44px;
    }

    .btn-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 240px; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer; border: none; outline: none;
      text-decoration: none; transition: all .18s;
    }
    .btn-primary { background: #818cf8; color: #fff; }
    .btn-primary:hover { background: #a5b4fc; box-shadow: 0 4px 20px rgba(129,140,248,.35); transform: translateY(-1px); }
    .btn-secondary { background: rgba(255,255,255,.06); color: #cbd5e1; border: 1px solid rgba(255,255,255,.1); }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: #f1f5f9; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: #475569; border: 1px solid transparent; font-size: 13px; }
    .btn-ghost:hover { color: #94a3b8; border-color: rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <img src="/image/logo2.png" class="logo" alt="logo">
      <div class="badge">Administrator Portal</div>
      <h1>Project Management</h1>
      <h2>Admin Access</h2>
      <div class="btn-stack">
        <a href="/login-admin" class="btn btn-primary">Log In</a>
        <a href="/signup-admin" class="btn btn-secondary">Create Account</a>
        <a href="/" class="btn btn-ghost">← User Access</a>
      </div>
    </div>
  </div>
</body>
</html>
