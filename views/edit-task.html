<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <title>Edit Task — ProManage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --surface-2: #f1f3f6;
      --border: #e5e7eb;
      --border-2: #d1d5db;
      --text: #111827;
      --text-2: #374151;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --accent: #e8b86d;
      --accent-h: #d4a55a;
      --accent-dim: rgba(232,184,109,.14);
      --danger: #dc2626;
      --danger-dim: rgba(220,38,38,.08);
      --nav-bg: #ffffff;
      --nav-border: #e5e7eb;
      --nav-text: #374151;
      --nav-hover: #f3f4f6;
      --nav-active: #111827;
      --dropdown-bg: #ffffff;
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --input-border: #d1d5db;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body.dark-theme {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: rgba(255,255,255,.08);
      --border-2: rgba(255,255,255,.12);
      --text: #f1f5f9;
      --text-2: #cbd5e1;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --accent-dim: rgba(232,184,109,.12);
      --nav-bg: #13161f;
      --nav-border: rgba(255,255,255,.06);
      --nav-text: #94a3b8;
      --nav-hover: rgba(255,255,255,.06);
      --nav-active: #f1f5f9;
      --dropdown-bg: #1e2232;
      --card-bg: #1a1d27;
      --input-bg: rgba(255,255,255,.04);
      --input-border: rgba(255,255,255,.1);
      --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      transition: background .25s, color .25s;
      -webkit-font-smoothing: antialiased;
    }

    .app-nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .25s, border-color .25s;
    }

    .nav-logo {
      width: 88px;
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity .25s ease;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
      justify-content: center;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--nav-text);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      background: var(--nav-hover);
      color: var(--nav-active);
    }

    .nav-links a i { font-size: 16px; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--border-2);
      transition: border-color .2s;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-btn:hover { border-color: var(--accent); }
    .avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

    .dropdown-wrap {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 260px;
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }

    .dropdown-wrap.open-menu { max-height: 320px; }

    .dropdown-card {
      background: var(--dropdown-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 8px;
      box-shadow: var(--shadow-lg);
      margin-top: 6px;
    }

    .dropdown-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .dropdown-user img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-2);
    }

    .dropdown-user-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .dropdown-user-role {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .dropdown-item:hover {
      background: var(--nav-hover);
      color: var(--text);
    }

    .dropdown-item i {
      font-size: 16px;
      color: var(--text-muted);
      width: 20px;
    }

    .item-label { flex: 1; }
    .item-arrow { font-size: 12px; color: var(--text-faint); }

    .dark-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
    }

    .dark-toggle-row i {
      font-size: 16px;
      color: var(--text-muted);
      width: 20px;
    }

    .dark-toggle-label {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
    }

    .toggle {
      position: relative;
      display: inline-flex;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border-2);
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle-thumb {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: var(--shadow-sm);
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-track { background: var(--accent); }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    .page {
      background: var(--bg);
      min-height: calc(100vh - 56px);
    }

    .page-inner {
      padding: 28px 28px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: background .25s, border-color .25s;
    }

    .card-body { padding: 20px 22px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      display: block;
      margin-bottom: 5px;
      letter-spacing: .2px;
    }

    .form-control,
    .form-select,
    input[type=text],
    input[type=datetime-local],
    select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 8px 11px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }

    .form-control:focus,
    .form-select:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      outline: none;
      text-decoration: none;
      text-align: center;
      transition: all .15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #1a0e00;
    }

    .btn-primary:hover {
      background: var(--accent-h);
      box-shadow: 0 2px 8px rgba(232,184,109,.3);
    }

    .task-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 12px;
      border: 1px solid var(--border);
    }

    @media(max-width: 900px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    @media(max-width: 768px) {
      .page-inner { padding: 20px 16px; }
      .app-nav { padding: 0 16px; }
      .nav-links { display: none; }
      .dropdown-wrap { right: 12px; }
    }
  </style>
</head>

<body>
  <nav class="app-nav">
    <img src="/image/logo-light.png" id="logoImage" class="nav-logo">

    <ul class="nav-links">
      <li><a href="/add-task"><i class='bx bx-task'></i>Add Tasks</a></li>
      <li><a href="/product-backlog"><i class='bx bx-list-ul'></i>Backlog</a></li>
      <li><a href="/add-member"><i class='bx bx-group'></i>Team</a></li>
      <li><a href="/add-sprint"><i class='bx bx-run'></i>Sprints</a></li>
      <li><a href="/change-user-password"><i class='bx bx-lock-alt'></i>Password</a></li>
      <li><a href="/home"><i class='bx bxs-home'></i></a></li>
    </ul>

    <div class="nav-right">
      <div class="avatar-btn" onclick="toggleMenu()">
        <img src="image/user.png" alt="user">
      </div>
    </div>

    <div class="dropdown-wrap" id="subMenu">
      <div class="dropdown-card">
        <div class="dropdown-user">
          <img src="image/user.png" alt="user">
          <div>
            <div class="dropdown-user-name">Admin</div>
            <div class="dropdown-user-role">Administrator</div>
          </div>
        </div>

        <div class="dark-toggle-row">
          <i class='bx bx-moon'></i>
          <span class="dark-toggle-label">Dark mode</span>
          <label class="toggle">
            <input type="checkbox" id="icon">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <a href="/" class="dropdown-item">
          <i class='bx bx-log-out'></i>
          <span class="item-label">Sign out</span>
          <span class="item-arrow">→</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="page">
    <div class="page-inner">
      <div class="page-header">
        <h1 class="page-title">Edit <%= task.name %></h1>
        <p class="page-subtitle">Update task details and assignment.</p>
        <div class="task-meta">
          <i class='bx bx-hash'></i>
          <span><%= task.id %></span>
        </div>
      </div>

      <div style="max-width: 720px;">
        <div class="card">
          <div class="card-body">
            <form action="/edit-task/<%= task._id %>" method="POST">
              <div class="form-group">
                <label for="name" class="form-label">Task Name</label>
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  id="name"
                  placeholder="Enter task name"
                  value="<%= task.name %>"
                />
              </div>

              <div class="form-group">
                <label for="description" class="form-label">Description</label>
                <input
                  type="text"
                  name="description"
                  class="form-control"
                  id="description"
                  placeholder="Enter description"
                  value="<%= task.description %>"
                />
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="teamMember" class="form-label">Assigned Member</label>
                  <select name="teamMember" class="form-select" id="teamMember">
                    <option value="" disabled hidden>Choose Member</option>
                    <% for(let i=0; i < members.length; i++ ){ %>
                      <option value="<%= members[i].name %>" <%= task.teamMember === members[i].name ? 'selected' : '' %>>
                        <%= members[i].name %>
                      </option>
                    <% } %>
                  </select>
                </div>

                <div class="form-group">
                  <label for="priority" class="form-label">Priority</label>
                  <select name="priority" class="form-select" id="priority">
                    <option value="" disabled hidden>Choose Priority</option>
                    <option value="Low" <%= task.priority === 'Low' ? 'selected' : '' %>>Low</option>
                    <option value="Medium" <%= task.priority === 'Medium' ? 'selected' : '' %>>Medium</option>
                    <option value="High" <%= task.priority === 'High' ? 'selected' : '' %>>High</option>
                    <option value="Urgent" <%= task.priority === 'Urgent' ? 'selected' : '' %>>Urgent</option>
                  </select>
                </div>
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="startDate" class="form-label">Start Date</label>
                  <input
                    type="datetime-local"
                    name="startDate"
                    class="form-control"
                    id="startDate"
                    value="<%= task.startDate || '2023-01-01T00:00' %>"
                  />
                </div>

                <div class="form-group">
                  <label for="dueDate" class="form-label">Due Date</label>
                  <input
                    type="datetime-local"
                    name="dueDate"
                    class="form-control"
                    id="dueDate"
                    value="<%= task.dueDate || '2023-01-01T00:00' %>"
                  />
                </div>
              </div>

              <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const subMenu = document.getElementById("subMenu");
    const darkToggle = document.getElementById("icon");
    const logoImage = document.getElementById("logoImage");
    const avatarBtn = document.querySelector(".avatar-btn");

    function toggleMenu() {
      subMenu.classList.toggle("open-menu");
    }

    document.addEventListener("click", function(e) {
      if (!subMenu.contains(e.target) && !avatarBtn.contains(e.target)) {
        subMenu.classList.remove("open-menu");
      }
    });

    function updateLogo(isDark) {
      if (!logoImage) return;
      logoImage.src = isDark
        ? "/image/logo-dark.png"
        : "/image/logo-light.png";
    }

    if (localStorage.getItem("darkMode") === "1") {
      document.body.classList.add("dark-theme");
      darkToggle.checked = true;
      updateLogo(true);
    } else {
      updateLogo(false);
    }

    darkToggle.addEventListener("change", function() {
      if (this.checked) {
        document.body.classList.add("dark-theme");
        localStorage.setItem("darkMode", "1");
        updateLogo(true);
      } else {
        document.body.classList.remove("dark-theme");
        localStorage.setItem("darkMode", "0");
        updateLogo(false);
      }
    });
  </script>
</body>
</html>
