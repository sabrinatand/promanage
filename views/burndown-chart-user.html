<!DOCTYPE html>
<html>
<head>
  <title>Burndown Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.5.0/chart.min.js"></script>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    /* Additional CSS styles */
    body {
      padding: 20px;
    }

    .btn-primary {
      background-color: black;
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background-color: darkgray;
    }

    .btn-group {
      margin-bottom: 20px;
    }

    .btn-group button {
      margin-right: 5px;
    }

    .chart-container {
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="btn-group">
  <a type="button" class="btn btn-primary" href="/home-user">Home</a>
</div>

<div>
  <h2>Actual Remaining Work for Each Day</h2>
  <!-- Buttons to update actual work -->
  <div class="btn-group">
    <button onclick="updateActualWork(0)">Day 1</button>
    <button onclick="updateActualWork(1)">Day 2</button>
    <button onclick="updateActualWork(2)">Day 3</button>
    <button onclick="updateActualWork(3)">Day 4</button>
    <button onclick="updateActualWork(4)">Day 5</button>
    <button onclick="updateActualWork(5)">Day 6</button>
    <button onclick="updateActualWork(6)">Day 7</button>
    <button onclick="updateActualWork(7)">Day 8</button>
    <button onclick="updateActualWork(8)">Day 9</button>
    <button onclick="updateActualWork(9)">Day 10</button>
    <button onclick="updateActualWork(10)">Day 11</button>
    <button onclick="updateActualWork(11)">Day 12</button>
    <button onclick="updateActualWork(12)">Day 13</button>
    <button onclick="updateActualWork(13)">Day 14</button>
  </div>
</div>

<div class="chart-container">
  <canvas id="burndownChart" width="800" height="400" style="display:none;"></canvas>
</div>
<script>
  const actualRemainingWork = [20, 16, 12, 8, 4, 10, 7, 5, 3, 2, 1, 0, 0, 0]; // Initial actual remaining work
  let burndownChart; // Store the chart instance

  function updateActualWork(dayIndex) {
    const newWork = parseInt(prompt(`Enter the actual remaining work for Day ${dayIndex + 1}:`));
    if (!isNaN(newWork)) {
      actualRemainingWork[dayIndex] = newWork;
      updateChart(); // Update the chart after modifying actualRemainingWork
    } else {
      alert('Please enter a valid number.');
    }
  }

  function updateChart() {
    const ctx = document.getElementById('burndownChart').getContext('2d');

    const days = ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7', 'Day 8', 'Day 9', 'Day 10', 'Day 11', 'Day 12', 'Day 13', 'Day 14'];  // Days of the 14-day sprint

    // Calculate the ideal remaining work (linear decrease)
    const totalWork = 20;  // Total work for the sprint
    const idealRemainingWork = Array.from({ length: 14 }, (_, i) => Math.round(totalWork - (i * (totalWork / 13))));

    const chartData = {
      labels: days,
      datasets: [
        {
          label: 'Remaining Work (Ideal)',
          data: idealRemainingWork,
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 2,
          fill: false
        },
        {
          label: 'Actual Remaining Work',
          data: actualRemainingWork,
          borderColor: 'rgba(255, 99, 132, 1)',
          borderWidth: 2,
          fill: false
        }
      ]
    };

    const config = {
      type: 'line',
      data: chartData,
      options: {
        scales: {
          x: {
            title: {
              display: true,
              text: 'Days'
            }
          },
          y: {
            title: {
              display: true,
              text: 'Remaining Work'
            }
          }
        }
      }
    };

    // Destroy previous chart instance if exists
    if (burndownChart) {
      burndownChart.destroy();
    }

    burndownChart = new Chart(ctx, config);
    document.getElementById('burndownChart').style.display = 'block'; // Display the chart canvas
  }
  updateChart();
</script>
</body>
</html>
