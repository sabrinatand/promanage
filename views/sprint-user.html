<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/bootstrap.min.css" rel="stylesheet" />
  <title>Product Backlog</title>
</head>

<div class="container pt-4">
  <a type="button" class="btn btn-dark" href="/home-user">Home</a>
  <a type="button" class="btn btn-dark" href="/add-task-user">Add Tasks</a>
</div>

<div class="container">
  <div class="my-4 p-5 bg-dark text-white rounded">
    <h1>Scrum</h1>
    <p>Sprints</p>
  </div>

  <body>
    <div class="container mt-4 rounded">
      <div class="row">
        <div class="col-auto">
          <a type="button" class="btn btn-dark" href="/add-sprint-user">Add Sprint</a>
        </div>
      </div>

      <div class="container mt-4 rounded">
        <table class="table table-sortable">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>View</th>
            </tr>
          </thead>
          <tbody>
            <% for (let i=0; i < sprints.length; i++) { %>
              <tr>
                <td>
                  <%= sprints[i].name %>
                </td>
                <td>
                  <%= sprints[i].status %>
                </td>
                <td>
                  <%= sprints[i].startDate.toDateString() %>
                </td>
                <td>
                  <%= sprints[i].endDate.toDateString() %>
                </td>
                <td>
                  <a href="/sprint-detail-user/<%= sprints[i]._id %>">
                    <button class="btn btn-dark">View</button>
                  </a>
                </td>
              </tr>
              <% } %>
          </tbody>
        </table>
      </div>
