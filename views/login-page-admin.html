<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
        <title>Admin Login Form</title>
    </head>
    <body>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'DM Sans', sans-serif;
            }

            body {
               display: flex;
               justify-content: center;
               align-items: center;
               min-height: 100vh;
               background: url(/image/background3.jpg) no-repeat;
               background-size: cover;
               background-position: center;
               background-attachment: fixed;
            }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: rgba(6, 8, 18, 0.78);
                z-index: 0;
            }

            .wrapper {
                position: relative;
                z-index: 1;
                width: 420px;
                background: rgba(14, 16, 30, 0.88);
                border: 1px solid rgba(129, 140, 248, 0.18);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                color: #eef0f7;
                border-radius: 16px;
                padding: 40px 40px 36px;
                box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(129,140,248,0.07);
            }

            .wrapper h1 {
                font-family: 'DM Sans', sans-serif;
                font-size: 28px;
                font-weight: 800;
                letter-spacing: -0.5px;
                text-align: center;
                margin-bottom: 8px;
                color: #eef0f7;
            }

            .wrapper .input-box {
                position: relative;
                width: 100%;
                height: 50px;
                margin: 20px 0;
            }

            .input-box input {
                width: 100%;
                height: 100%;
                background: rgba(129, 140, 248, 0.05);
                border: 1px solid rgba(129, 140, 248, 0.15);
                outline: none;
                border-radius: 10px;
                font-size: 14px;
                font-family: 'DM Sans', sans-serif;
                color: #eef0f7;
                padding: 0 44px 0 16px;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .input-box input::placeholder {
                color: rgba(238, 240, 247, 0.35);
            }

            .input-box input:focus {
                border-color: #818cf8;
                box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
            }

            .input-box i {
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 18px;
                color: rgba(238, 240, 247, 0.3);
                pointer-events: none;
            }

            .wrapper .btn {
                width: 100%;
                height: 46px;
                border: none;
                outline: none;
                border-radius: 10px;
                cursor: pointer;
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                font-weight: 600;
                transition: all 0.2s ease;
            }

            form .btn {
                background: #818cf8;
                color: #fff;
                box-shadow: 0 4px 14px rgba(129,140,248,0.25);
            }
            form .btn:hover {
                background: #a5b4fc;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(129,140,248,0.35);
            }

            div > .btn {
                background: rgba(129, 140, 248, 0.07);
                color: #eef0f7;
                border: 1px solid rgba(129, 140, 248, 0.15) !important;
            }
            div > .btn:hover {
                background: rgba(129, 140, 248, 0.13);
                transform: translateY(-1px);
            }

            .button-link { text-decoration: none; }
            div:not(:last-child) { margin-bottom: 10px; }
        </style>

        <div class="wrapper">
            <form action="/login-admin" method="POST">
                <h1>Admin Login</h1>
                <div class="input-box">
                    <input type="text" name="usernameAdmin" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
            <div class="input-box">
                <input type="password" name="passwordAdmin" placeholder="Password" required>
                <i class='bx bxs-lock-alt' ></i>
            </div>
            <div>
                <a href="/home" class="button-link">
                <button type="submit" class="btn">Submit</button>
                </a>
            </div>
            </form>
            <br>
            <div>
                <a href="/signup-admin" class="button-link">
                <button class="btn">Create Account</button>
                </a>
            </div>
            <br>
            <div>
                <a href="/admin" class="button-link">
                <button class="btn">Go Back</button>
                </a>
            </div>
        </div>
    </body>
</html>
