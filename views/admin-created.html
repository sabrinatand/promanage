<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Admin Account Created</title>
</head>

<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url(/image/background2.jpg) no-repeat center center/cover;
      background-attachment: fixed;
      position: relative;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 16, 0.72);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: rgba(18, 21, 32, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #f0ede8;
      border-radius: 16px;
      padding: 40px 32px 36px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .wrapper h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(240, 237, 232, 0.65);
      margin-bottom: 24px;
    }

    .credential-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
      text-align: left;
    }

    .credential-box h2 {
      font-size: 14px;
      color: #e8b86d;
      margin-bottom: 6px;
    }

    .credential-box p {
      font-size: 14px;
      color: #f0ede8;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      height: 46px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      color: #f0ede8;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: all 0.2s ease;
      margin-top: 16px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.11);
      transform: translateY(-1px);
    }

    .button-link {
      text-decoration: none;
    }

    @media (max-width: 576px) {
      .wrapper {
        padding: 30px 20px;
      }
    }
  </style>

  <div class="wrapper">

    <h1>Admin Account Created</h1>
    <p class="subtitle">Admin credentials have been successfully generated.</p>

    <div class="credential-box">
      <h2>Username</h2>
      <p>admin1</p>
    </div>

    <div class="credential-box">
      <h2>Password</h2>
      <p>Admin1</p>
    </div>

    <a href="/" class="button-link">
      <button class="btn">Go Back</button>
    </a>
  </div>

</body>
</html>
